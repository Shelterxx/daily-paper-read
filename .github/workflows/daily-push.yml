name: Daily Literature Push

on:
  # 每天 UTC 01:00（北京 09:00）
  schedule:
    - cron: '0 1 * * *'

  # 手动触发
  workflow_dispatch:

# 防止并发运行
concurrency:
  group: literature-push
  cancel-in-progress: false

jobs:
  push-literature:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore state from cache
        uses: actions/cache@v4
        with:
          path: state/
          key: literature-state-${{ github.run_id }}
          restore-keys: |
            literature-state-

      - name: Run pipeline
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          SCI_SEARCH_API_TOKEN: ${{ secrets.SCI_SEARCH_API_TOKEN }}
          SCI_SEARCH_API_URL: ${{ secrets.SCI_SEARCH_API_URL }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          OBSIDIAN_VAULT_PAT: ${{ secrets.OBSIDIAN_VAULT_PAT }}
        run: python -m src.main

      - name: Commit state files
        if: always()
        run: |
          git config user.name "Literature Push Bot"
          git config user.email "bot@literature-push"
          # Commit state files for persistence
          if [ -d state ] && [ "$(ls -A state 2>/dev/null)" ]; then
            git add state/
            git diff --cached --quiet || git commit -m "state: update $(date +%Y-%m-%d)"
            git push
          fi
