# Daily Literature Push Configuration (每日文献推送配置)
# Copy this file to config.yaml and customize for your research.

# Research topics: each topic defines a search scope with its own queries and thresholds
research_topics:
  - name: "空气质量智能预测"
    description: >
      Air quality prediction and forecasting using novel or recently developed
      computational methods. Interested in any new approach that goes beyond
      traditional chemical transport model simulation (CMAQ, WRF-Chem, GEOS-Chem)
      for predicting PM2.5, O3, NO2 and other pollutants. This includes but is
      not limited to machine learning, deep learning, data-driven models,
      hybrid physics-data approaches, spatiotemporal modeling, and new
      statistical or mathematical frameworks.
    max_push: 5
    relevance_thresholds:
      high: 8
      medium: 7

  - name: "排放反演与遥感"
    description: >
      Top-down emission estimation and satellite remote sensing for atmospheric
      pollutants. Interested in inverse modeling, satellite-based emission retrieval,
      data assimilation for emission optimization, source apportionment with modern
      approaches, and any new methods for estimating NOx, SO2, VOCs, PM2.5, CH4
      emissions from observations. Excludes traditional bottom-up emission inventory
      compilation using emission factors and activity data.
    max_push: 5
    relevance_thresholds:
      high: 8
      medium: 7

  - name: "大气环境计算新方法"
    description: >
      Recent computational and analytical methods applied to atmospheric environment
      research. Covers new approaches in atmospheric chemistry modeling, remote sensing
      inversion, air quality data analysis, model emulation and acceleration,
      uncertainty quantification, and environmental data science. Any paper that
      introduces or applies a recently developed methodology to atmospheric
      environment problems, beyond conventional statistical or modeling approaches.
    max_push: 3
    relevance_thresholds:
      high: 8
      medium: 7

  - name: "固废危废智能监管"
    description: >
      AI and computer vision methods for solid waste and hazardous waste management
      and regulation. Includes visual recognition and detection of illegal waste dumping,
      waste classification using deep learning, satellite/drone imagery analysis for
      waste site monitoring, intelligent inspection systems for hazardous waste
      transportation and storage, and any novel computational approach applied to
      waste governance and environmental compliance.
    max_push: 3
    relevance_thresholds:
      high: 8
      medium: 7
    zotero_archive: false

# Global source toggles (individual topics can override)
sources:
  arxiv:
    enabled: false                     # arXiv 对环境领域噪声大，不建议启用
    max_results: 20
  sci_search:
    enabled: true
    max_results: 20
  openalex:
    enabled: true
    max_results: 20

# LLM API configuration (supports Claude, GLM, DeepSeek, MiniMax via OpenAI-compatible interface)
llm:
  scoring_model: "deepseek-v4-flash"    # Fast model for batch scoring
  analysis_model: "deepseek-v4-flash"   # Capable model for deep analysis
  base_url: "https://api.deepseek.com"       # Change for other providers
  api_key_env: "LLM_API_KEY"                      # Name of env var holding API key

# Notification settings
notification:
  feishu_webhook_env: "FEISHU_WEBHOOK_URL"        # Name of env var holding Feishu webhook URL
  language: "zh"                                    # Output language: zh, en, or mixed
  compact_cards: false                              # Collapsible panel only works with App API mode

# How far back to search for new papers (hours)
search_timeframe_hours: 24

# State directory for tracking seen papers (relative to repo root)
state_dir: "state"

# Zotero integration (optional — set enabled: true and fill .env to activate)
zotero:
  enabled: true
  collection_root: "DailyPapers"
  archive_threshold: 9              # Only archive papers scoring >= 9 (push threshold is 8)

# Obsidian vault integration (optional — set enabled: true and fill .env to activate)
obsidian:
  enabled: true
  vault_repo_url: "https://github.com/Shelterxx/literature-vault.git"

# Interactive "Interested" button (optional — no Feishu App registration needed!)
# When enabled, HIGH papers show a "⭐ 感兴趣" button in Feishu cards.
# Users click the button → browser opens archive service → paper archived to Zotero.
# Works with existing webhook bot — just deploy the archive service to a free cloud platform.
#
# Setup:
#   1. Set ARCHIVE_SECRET env var (any random string for URL signing)
#   2. Deploy archive service: uvicorn src.callback_server:app --host 0.0.0.0 --port $PORT
#      (deploy to Railway/Render/Vercel for free cloud hosting)
#   3. Set callback_base_url below to your deployed service URL
#   4. Set FEISHU_VERIFICATION_TOKEN env var = same value as ARCHIVE_SECRET
feishu_app:
  enabled: true
  app_id_env: "FEISHU_APP_ID"
  app_secret_env: "FEISHU_APP_SECRET"
  chat_id_env: "FEISHU_CHAT_ID"
  callback_base_url: ""           # e.g. "https://your-app.railway.app"
