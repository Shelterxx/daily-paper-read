# Daily Literature Push Configuration (每日文献推送配置)
# Copy this file to config.yaml and customize for your research.
#
# Environment Variables (set in .env locally or GitHub Secrets for CI):
# ──────────────────────────────────────────────────────────
# Required:
#   LLM_API_KEY            - API key for LLM scoring/analysis
#   FEISHU_APP_ID          - Feishu App ID
#   FEISHU_APP_SECRET      - Feishu App Secret
#   FEISHU_CHAT_ID         - Target group chat ID
#
# Optional:
#   SCI_SEARCH_API_TOKEN   - sci_search API token
#   SCI_SEARCH_API_URL     - sci_search API URL
#   OPENALEX_EMAIL         - OpenAlex polite pool (faster access)
#   S2_API_KEY             - Semantic Scholar higher rate limits
#   UNPAYWALL_EMAIL        - Unpaywall OA PDF lookup
#   ZOTERO_USER_ID         - Zotero user ID
#   ZOTERO_API_KEY         - Zotero API key
#   OBSIDIAN_VAULT_PAT     - GitHub PAT for Obsidian vault repo
#   FEISHU_VERIFICATION_TOKEN - For interactive button callback
# ──────────────────────────────────────────────────────────

# Research topics: each topic defines a search scope with its own queries and thresholds
# Tips for better precision:
#   - Focus on PROBLEM DOMAIN + SELECTION CRITERIA, not specific techniques
#   - Use "beyond traditional" / "novel approaches" to filter out old methods
#   - The scoring prompt automatically excludes: traditional CMAQ/WRF-Chem simulation,
#     pure monitoring/policy studies, indoor air quality, pure climate/carbon studies,
#     and traditional bottom-up emission inventories
research_topics:
  - name: "Your Topic Name"
    description: >
      Describe what research you want to see. Focus on the problem domain
      and what makes a paper relevant (e.g., novel methods, recent approaches).
      Avoid listing specific techniques — use "includes but is not limited to"
      to avoid missing new approaches you haven't thought of.
    max_push: 5                        # Max papers to push per topic per run
    relevance_thresholds:
      high: 8                          # Score >= this triggers deep analysis + push
      medium: 7                        # Score >= this is medium (not pushed)

  # - name: "Second Topic"
  #   description: "Another research direction"
  #   max_push: 5
  #   relevance_thresholds:
  #     high: 8
  #     medium: 7

# Global source toggles
sources:
  arxiv:
    enabled: false                     # 对环境/地学领域噪声较大，建议禁用
    max_results: 20
  sci_search:
    enabled: false                     # Requires SCI_SEARCH_API_TOKEN
    max_results: 20
  openalex:
    enabled: true                      # Set OPENALEX_EMAIL for faster access
    max_results: 20
  semantic_scholar:
    enabled: false                     # Optional S2_API_KEY
    max_results: 20

# LLM API (supports DeepSeek, OpenAI, GLM via OpenAI-compatible interface)
llm:
  scoring_model: "deepseek-v4-flash"     # Fast model for batch scoring
  analysis_model: "deepseek-v4-flash"    # Capable model for deep analysis
  base_url: "https://api.deepseek.com" # Change for other providers
  api_key_env: "LLM_API_KEY"

# Notification
notification:
  feishu_webhook_env: "FEISHU_WEBHOOK_URL"  # Webhook fallback (optional)
  language: "zh"                             # zh / en / mixed
  compact_cards: false                       # Collapsible panel only works with App API

# How far back to search for new papers (hours)
search_timeframe_hours: 24

# State directory
state_dir: "state"

# Zotero integration (optional)
zotero:
  enabled: false
  collection_root: "DailyPapers"
  archive_threshold: 9                # Only archive papers scoring >= this

# Obsidian vault (optional)
obsidian:
  enabled: false
  vault_repo_url: ""

# Feishu App (required for collapsible panel cards)
feishu_app:
  enabled: true
  app_id_env: "FEISHU_APP_ID"
  app_secret_env: "FEISHU_APP_SECRET"
  chat_id_env: "FEISHU_CHAT_ID"
  callback_base_url: ""               # Optional: interactive "Interested" button
